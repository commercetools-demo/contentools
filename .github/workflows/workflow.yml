name: Deploy Express Backend to Cloud Run

on:
  push:
    branches: [ dododo ]  # Adjust branch name if needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 
      name: demo
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
      
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Debug - Show working directory
      run: |
        pwd
        ls -la
        
    - name: Deploy to Cloud Run
      env:
        STORAGE_TYPE: ${{ vars.STORAGE_TYPE }}
      run: |
        set -e
        ENV_ARGS=(
          --set-env-vars "GCP_FIRESTORE_DATABASE_ID=${{ vars.GCP_FIRESTORE_DATABASE_ID }}"
          --set-env-vars "GCP_FIRESTORE_SERVICE_ACCOUNT_CLIENT_EMAIL=${{ vars.GCP_FIRESTORE_SERVICE_ACCOUNT_CLIENT_EMAIL }}"
          --set-env-vars "GCP_FIRESTORE_SERVICE_ACCOUNT_PRIVATE_KEY=${{ secrets.GCP_FIRESTORE_SERVICE_ACCOUNT_PRIVATE_KEY }}"
          --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          --set-env-vars "STORAGE_TYPE=${{ vars.STORAGE_TYPE }}"
          --set-env-vars "JWT_EXPIRATION=${{ vars.JWT_EXPIRATION }}"
          --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"
        )
        if [ "$STORAGE_TYPE" = "gcp" ]; then
          ENV_ARGS+=(
            --set-env-vars "GCP_BUCKET_NAME=${{ vars.GCP_BUCKET_NAME }}"
            --set-env-vars "GCP_STORAGE_SERVICE_ACCOUNT_CLIENT_EMAIL=${{ vars.GCP_STORAGE_SERVICE_ACCOUNT_CLIENT_EMAIL }}"
            --set-env-vars "GCP_STORAGE_SERVICE_ACCOUNT_PRIVATE_KEY=${{ secrets.GCP_STORAGE_SERVICE_ACCOUNT_PRIVATE_KEY }}"
          )
        elif [ "$STORAGE_TYPE" = "aws" ]; then
          ENV_ARGS+=(
            --set-env-vars "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"
            --set-env-vars "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            --set-env-vars "AWS_REGION=${{ vars.AWS_REGION }}"
            --set-env-vars "AWS_S3_BUCKET=${{ vars.AWS_S3_BUCKET }}"
          )
        elif [ "$STORAGE_TYPE" = "cloudinary" ]; then
          ENV_ARGS+=(
            --set-env-vars "CLOUDINARY_CLOUD_NAME=${{ vars.CLOUDINARY_CLOUD_NAME }}"
            --set-env-vars "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
            --set-env-vars "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
          )
        fi
        gcloud run deploy multitenant-contentools \
          --source service/ \
          --region us-central1 \
          --allow-unauthenticated \
          --memory 512Mi \
          --min-instances 1 \
          --timeout 300 \
          --clear-base-image \
          "${ENV_ARGS[@]}"
